<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Will you give me another chance?</title>

<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: 'Quicksand', sans-serif;
  color: white;

  background: linear-gradient(-45deg, #ffb6c1, #ff69b4, #6a0dad, #2a1230);
  background-size: 400% 400%;
  animation: gradientMove 12s ease infinite;
}

@keyframes gradientMove {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* 🌙 moon */
.moon {
  position: absolute;
  top: 40px;
  right: 60px;
  width: 95px;
  height: 95px;
  border-radius: 50%;
  background: radial-gradient(circle at 30% 30%, #fff, #f5f5f5, #cfcfcf);
  box-shadow: 0 0 40px rgba(255,255,255,0.7);
  animation: moonFloat 8s ease-in-out infinite;
}

@keyframes moonFloat {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(10px); }
}

/* 🌸 petals */
.petal {
  position: absolute;
  top: -10px;
  font-size: 18px;
  animation: fall linear infinite;
}

@keyframes fall {
  0% { transform: translateY(-10vh) rotate(0); opacity: 0; }
  10% { opacity: 1; }
  100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
}

/* 💧 droplets */
.drop {
  position: absolute;
  width: 6px;
  height: 14px;
  background: rgba(255,255,255,0.3);
  border-radius: 50%;
  animation: drip linear forwards;
}

@keyframes drip {
  from { transform: translateY(-10px); opacity: 0; }
  10% { opacity: 1; }
  to { transform: translateY(120vh); opacity: 0; }
}

/* 💎 box */
.box {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);

  width: 85%;
  max-width: 520px;

  padding: 30px 20px;
  text-align: center;

  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;

  background: rgba(255,255,255,0.12);
  border-radius: 20px;
  backdrop-filter: blur(14px);

  animation: breathe 6s ease-in-out infinite;
  overflow: hidden;
}

@keyframes breathe {
  0%,100% { transform: translate(-50%, -50%) scale(1); }
  50% { transform: translate(-50%, -52%) scale(1.02); }
}

/* shine */
.box::after {
  content: "";
  position: absolute;
  top: -50%;
  left: -60%;
  width: 40%;
  height: 200%;
  background: linear-gradient(120deg, transparent, rgba(255,255,255,0.3), transparent);
  transform: rotate(25deg);
  animation: shine 6s infinite;
}

@keyframes shine {
  from { left: -60%; }
  to { left: 130%; }
}

.box > * { position: relative; z-index: 1; }

/* text */
h1 { margin: 0; font-size: 24px; }
#typing { min-height: 30px; color: #fff0f5; }

button {
  padding: 10px 18px;
  border: none;
  border-radius: 25px;
  cursor: pointer;
}

#yes { background: #ffb6c1; }
#no { background: #fff; }

/* 🌫️ fog */
.box::before {
  content: "";
  position: absolute;
  inset: 0;
  background:
    radial-gradient(circle at 20% 30%, rgba(255,255,255,0.18), transparent 40%),
    radial-gradient(circle at 70% 60%, rgba(255,255,255,0.12), transparent 45%);
  filter: blur(6px);
}

/* 🌸 fade in */
.fade-in {
  opacity: 0;
  animation: fadeIn 1.2s forwards;
}
.fade1 { animation-delay: 0.3s; }
.fade2 { animation-delay: 0.8s; }
.fade3 { animation-delay: 1.4s; }

@keyframes fadeIn {
  to { opacity: 1; }
}

/* 🐱 cat */
.corner-cat, .rose-cat {
  position: fixed;
  padding: 10px;
  font-size: 12px;
  width: 220px;
  background: rgba(255,255,255,0.10);
  border-radius: 14px;
  backdrop-filter: blur(10px);
  animation: float 5s ease-in-out infinite;
}

.corner-cat {
  bottom: 20px;
  left: 20px;
}

.rose-cat {
  bottom: 20px;
  right: 20px;
  text-align: center;
}

@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-6px); }
}

/* eyes blink */
.eye {
  display: inline-block;
  width: 8px;
  height: 8px;
  background: white;
  border-radius: 50%;
  animation: blink 3s infinite;
}

@keyframes blink {
  0%,92%,100% { transform: scaleY(1); }
  95% { transform: scaleY(0.1); }
}
</style>
</head>

<body>

<div class="moon"></div>

<!-- 🐱 apology cat -->
<div class="corner-cat">
  🐱💔<br>
  forgive this little fella boi..<br>
  she is very sorry for hurting u..<br>
  i have scolded him 😿
</div>

<!-- 🐱🌹 rose cat -->
<div class="rose-cat">
  🐱🌹<br>
  take these roses… for you 💖
</div>

<audio id="bgmusic" loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8b6b6c1b2.mp3">
</audio>

<audio id="sadSound">
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_2b9f3b8d8a.mp3">
</audio>

<button id="musicBtn">🎵 Play Music</button>

<div class="box fade-in fade1">

<h1>Will you give me another chance? 💔</h1>

<p id="typing" class="fade-in fade2"></p>

<button id="yes" class="fade-in fade3">Yes ❤️</button>
<button id="no" class="fade-in fade3">No 😢</button>

<h2 id="msg"></h2>

</div>

<script>

const music = document.getElementById("bgmusic");
const sad = document.getElementById("sadSound");

document.getElementById("musicBtn").onclick = () => music.play();

/* typing */
const text = "will you give me another chance? 💔";
let i = 0;
function type(){
if(i<text.length){
document.getElementById("typing").innerHTML += text[i++];
setTimeout(type,60);
}}
type();

/* YES */
yes.onclick = () => {
document.body.style.background =
"linear-gradient(120deg,#ff9a9e,#fad0c4,#fff1a8)";

document.querySelector(".box").innerHTML =
"🌅 I promise this time I’m gonna give it my all<br>and I’m sorry for all the hurt I caused you 💖";

yes.style.display="none";
no.style.display="none";
};

/* NO loop */
const noTexts=[
"💔 please don’t say no...",
"🥺 think about it...",
"💖 I’ll change...",
"🙏 one more chance..."
];
let n=0;

no.onclick = () => {
no.innerText = noTexts[n];
n=(n+1)%noTexts.length;

no.style.position="absolute";
no.style.left=Math.random()*80+"vw";
no.style.top=Math.random()*80+"vh";

sad.currentTime=0;
sad.play();
};

/* petals */
setInterval(()=>{
const p=document.createElement("div");
p.className="petal";
p.innerHTML="🌸";
p.style.left=Math.random()*100+"vw";
p.style.animationDuration=(5+Math.random()*5)+"s";
document.body.appendChild(p);
setTimeout(()=>p.remove(),10000);
},300);

/* droplets */
setInterval(()=>{
const d=document.createElement("div");
d.className="drop";
d.style.left=Math.random()*100+"%";
d.style.animationDuration=(3+Math.random()*4)+"s";
document.querySelector(".box").appendChild(d);
setTimeout(()=>d.remove(),8000);
},500);

</script>

</body>
</html>
