<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Will you give me another chance?</title>

<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: 'Quicksand', sans-serif;
  color: white;

  background: linear-gradient(-45deg, #ffb6c1, #ff69b4, #6a0dad, #2a1230);
  background-size: 400% 400%;
  animation: gradientMove 12s ease infinite;
  transition: all 1s ease;
}

@keyframes gradientMove {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* 🌙 moon */
.moon {
  position: absolute;
  top: 40px;
  right: 60px;
  width: 95px;
  height: 95px;
  border-radius: 50%;
  background: radial-gradient(circle at 30% 30%, #fff, #f5f5f5, #cfcfcf);
  box-shadow: 0 0 40px rgba(255,255,255,0.7);
  animation: moonFloat 8s ease-in-out infinite;
}

@keyframes moonFloat {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(10px); }
}

/* 🌸 petals */
.petal {
  position: absolute;
  top: -10px;
  font-size: 18px;
  animation: fall linear infinite;
}

@keyframes fall {
  0% { transform: translateY(-10vh) rotate(0); opacity: 0; }
  10% { opacity: 1; }
  100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
}

/* 💧 droplets */
.drop {
  position: absolute;
  width: 6px;
  height: 14px;
  background: rgba(255,255,255,0.3);
  border-radius: 50%;
  animation: drip linear forwards;
}

@keyframes drip {
  from { transform: translateY(-10px); opacity: 0; }
  10% { opacity: 1; }
  to { transform: translateY(120vh); opacity: 0; }
}

/* 💎 BOX (NO SHAKE) */
.box {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);

  width: 85%;
  max-width: 520px;

  padding: 30px 20px;
  text-align: center;

  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;

  background: rgba(255,255,255,0.12);
  border-radius: 20px;
  backdrop-filter: blur(14px);

  animation: breathe 6s ease-in-out infinite;
  will-change: transform;
  overflow: hidden;
}

@keyframes breathe {
  0%,100% {
    transform: translate(-50%, -50%) scale(1);
  }
  50% {
    transform: translate(-50%, -50%) scale(1.02);
  }
}

/* shine */
.box::after {
  content: "";
  position: absolute;
  top: -50%;
  left: -60%;
  width: 40%;
  height: 200%;
  background: linear-gradient(120deg, transparent, rgba(255,255,255,0.3), transparent);
  transform: rotate(25deg);
  animation: shine 6s infinite;
}

@keyframes shine {
  from { left: -60%; }
  to { left: 130%; }
}

.box > * { position: relative; z-index: 1; }

/* fog */
.box::before {
  content: "";
  position: absolute;
  inset: 0;
  background:
    radial-gradient(circle at 20% 30%, rgba(255,255,255,0.18), transparent 40%),
    radial-gradient(circle at 70% 60%, rgba(255,255,255,0.12), transparent 45%);
  filter: blur(6px);
}

/* TEXT */
h1 { margin: 0; font-size: 24px; }
#typing { min-height: 30px; color: #fff0f5; }

button {
  padding: 10px 18px;
  border: none;
  border-radius: 25px;
  cursor: pointer;
}

#yes { background: #ffb6c1; }
#no { background: #fff; }

/* 🐱 CATS */
.corner-cat, .rose-cat {
  position: fixed;
  padding: 14px 16px;
  width: 240px;

  font-size: 13px;
  line-height: 1.5;
  font-weight: 600;

  color: white;
  text-shadow: 0 2px 10px rgba(0,0,0,0.6);

  background: rgba(255,255,255,0.14);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 16px;

  backdrop-filter: blur(12px);
  animation: float 5s ease-in-out infinite;

  box-shadow: 0 0 25px rgba(255, 182, 193, 0.25);
}

.corner-cat { bottom: 20px; left: 20px; }
.rose-cat { bottom: 20px; right: 20px; text-align: center; }

@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-6px); }
}

/* 💔 FLOATING MSG */
.float-msg {
  position: absolute;
  font-size: 16px;
  font-weight: 700;
  opacity: 0.95;
  color: white;
  text-shadow: 0 0 10px rgba(0,0,0,0.6);
  animation: floatMsg 5s linear forwards;
  pointer-events: none;
  max-width: 220px;
  text-align: center;
}

@keyframes floatMsg {
  0% { transform: translateY(0); opacity: 0; }
  10% { opacity: 1; }
  100% { transform: translateY(-120px); opacity: 0; }
}

/* 📱 MOBILE */
@media (max-width: 768px) {

  .box {
    width: 90%;
    padding: 20px 16px;
  }

  h1 { font-size: 18px; }

  #typing { font-size: 14px; }

  button {
    font-size: 14px;
    padding: 10px 14px;
  }

  .moon {
    width: 60px;
    height: 60px;
    top: 15px;
    right: 15px;
  }

  .corner-cat,
  .rose-cat {
    width: 160px;
    font-size: 10px;
    padding: 8px;
  }
}
</style>
</head>

<body>

<div class="moon"></div>

<div class="corner-cat">
🐱💔 he is very sorry...<br>
me catto has told/scolded him<br>
not to do this ever again 😿
</div>

<div class="rose-cat">
🐱🌹 take these roses… 💖
</div>

<div class="box">

<h1>Will you give me another chance? 💔</h1>
<p id="typing"></p>

<button id="yes">Yes ❤️</button>
<button id="no">No 😢</button>

</div>

<script>

const text = "will you give me another chance? 💔";
let i = 0;

function type(){
if(i < text.length){
document.getElementById("typing").innerHTML += text[i++];
setTimeout(type,60);
}}
type();

/* YES FIXED READABILITY */
yes.onclick = () => {

document.body.style.background =
"linear-gradient(120deg,#ff9a9e,#fad0c4,#fff1a8)";

document.body.style.color = "#2b2b2b";

const box = document.querySelector(".box");
box.style.background = "rgba(255,255,255,0.75)";
box.style.backdropFilter = "blur(10px)";
box.style.color = "#2b2b2b";

box.innerHTML =
"🌅 I promise this time I’m gonna give it my all<br><br>" +
"💖 I’m really sorry for all the hurt I caused you<br><br>" +
"🌸 Thank you for giving me a chance";

yes.style.display="none";
no.style.display="none";
};

/* NO LOOP */
const noTexts = [
"think about it again... 🥺",
"please forgive me... 😢",
"don’t leave me like this... 💔",
"one more chance please... 💖"
];

let n = 0;

no.onclick = () => {
no.innerText = noTexts[n];
n = (n + 1) % noTexts.length;

no.style.position = "absolute";
no.style.left = Math.random() * 80 + "vw";
no.style.top = Math.random() * 80 + "vh";
};

/* floating msgs */
function spawnMsg(){
const m = document.createElement("div");
m.className = "float-msg";

const texts = [
"💔 forgive this little fella...",
"😢 he has hurted you but he is sorry for everything...",
"🥺 please don’t leave...",
"💖 one more chance please..."
];

m.innerText = texts[Math.floor(Math.random() * texts.length)];

m.style.left = Math.random() * 70 + "vw";
m.style.top = (50 + Math.random() * 30) + "vh";

document.body.appendChild(m);
setTimeout(() => m.remove(), 5000);
}

setInterval(spawnMsg, 2200);

</script>

</body>
</html>
