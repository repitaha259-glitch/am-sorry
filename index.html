<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Will you give me another chance?</title>

<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: 'Quicksand', sans-serif;
  color: white;
  height: 100vh;

  background: linear-gradient(-45deg, #ffb6c1, #ff69b4, #6a0dad, #2a1230);
  background-size: 400% 400%;
  animation: gradientMove 12s ease infinite;
}

/* overlay for readability */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.25);
  z-index: 0;
}

@keyframes gradientMove {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* 🌟 stars */
.star {
  position: fixed;
  width: 2px;
  height: 2px;
  background: white;
  border-radius: 50%;
  box-shadow: 0 0 6px rgba(255,255,255,0.6);
  animation: twinkle 3s infinite ease-in-out;
  z-index: 0;
}

@keyframes twinkle {
  0%,100% { opacity: 0.2; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.8); }
}

/* 🌙 moon */
.moon {
  position: absolute;
  top: 40px;
  right: 60px;
  width: 95px;
  height: 95px;
  border-radius: 50%;
  background: radial-gradient(circle at 30% 30%, #fff, #f5f5f5, #cfcfcf);
  box-shadow: 0 0 40px rgba(255,255,255,0.7);
  animation: moonFloat 8s ease-in-out infinite;
  z-index: 2;
}

@keyframes moonFloat {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(10px); }
}

/* 🌸 petals */
.petal {
  position: absolute;
  top: -20px;
  width: 18px;
  height: 18px;
  background-image: url("https://pngimg.com/uploads/petals/petals_PNG114.png");
  background-size: cover;

  filter: drop-shadow(0 0 6px rgba(255,182,193,0.7))
          drop-shadow(0 0 12px rgba(255,105,180,0.4));

  animation: fall linear forwards;
  opacity: 0.9;
}

@keyframes fall {
  0% { transform: translateY(-10vh) translateX(0); opacity: 0; }
  10% { opacity: 1; }
  50% { transform: translateY(50vh) translateX(40px) rotate(180deg); }
  100% { transform: translateY(110vh) translateX(-40px) rotate(360deg); opacity: 0; }
}

/* 💧 droplets */
.drop {
  position: absolute;
  width: 6px;
  height: 14px;
  background: rgba(255,255,255,0.3);
  border-radius: 50%;
  animation: drip linear forwards;
}

@keyframes drip {
  from { transform: translateY(-10px); opacity: 0; }
  10% { opacity: 1; }
  to { transform: translateY(120vh); opacity: 0; }
}

/* 💎 box */
.box {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 85%;
  max-width: 520px;

  padding: 30px 20px;
  text-align: center;

  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;

  background: rgba(255,255,255,0.14);
  backdrop-filter: blur(18px);
  border-radius: 20px;

  box-shadow:
    0 0 25px rgba(255,182,193,0.15),
    0 0 60px rgba(255,105,180,0.08);

  z-index: 3;
  overflow: hidden;
}

h1 { margin: 0; font-size: 24px; }
#typing { min-height: 30px; color: #ffe4f1; }

button {
  padding: 10px 18px;
  border: none;
  border-radius: 25px;
  cursor: pointer;
}

#yes { background: #ffb6c1; }
#no { background: #fff; }

/* 🐱 walking cats */
.walk-cat {
  position: absolute;
  bottom: 0;
  font-size: 26px;
  animation: walk linear forwards;
  pointer-events: none;
  z-index: 1;

  filter: drop-shadow(0 0 8px rgba(255,182,193,0.6))
          drop-shadow(0 0 14px rgba(255,105,180,0.4));
}

@keyframes walk {
  0% { transform: translateX(-10vw); }
  100% { transform: translateX(110vw); }
}

/* 💖 SORRY LINE */
.sorry-cat {
  position: absolute;
  bottom: 25%;
  font-size: 32px;
  display: flex;
  gap: 10px;
  z-index: 5;
  pointer-events: none;
}

.sorry-letter {
  animation: pop 1.5s infinite ease-in-out;
}

@keyframes pop {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-6px); }
}

/* floating msgs */
.float-msg {
  position: absolute;
  font-size: 16px;
  animation: floatMsg 5s linear forwards;
  pointer-events: none;
  z-index: 1;
}

@keyframes floatMsg {
  0% { opacity: 0; transform: translateY(0); }
  10% { opacity: 1; }
  100% { opacity: 0; transform: translateY(-120px); }
}
</style>
</head>

<body>

<div class="moon"></div>

<div class="box" id="box">
  <h1>Will you give me another chance? 💔</h1>
  <p id="typing"></p>
  <button id="yes">Yes ❤️</button>
  <button id="no">No 😢</button>
</div>

<audio id="sadSound" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_2b9f3b8d8a.mp3"></audio>

<script>

/* typing */
const text = "will you give me another chance? 💔";
let i = 0;
function type(){
  if(i < text.length){
    document.getElementById("typing").innerHTML += text[i++];
    setTimeout(type,60);
  }
}
type();

/* YES */
yes.onclick = () => {
  document.getElementById("box").innerHTML =
  "🌸 thank you... I’ll do better 💖";
  document.body.style.background =
  "linear-gradient(120deg,#ff9a9e,#fad0c4,#fff1a8)";
};

/* NO */
const noTexts = ["💔 please...", "🥺 think again", "💖 I’ll change", "🙏 one more chance"];
let n = 0;

no.onclick = () => {
  no.innerText = noTexts[n];
  n = (n + 1) % noTexts.length;

  no.style.position = "absolute";
  no.style.left = Math.random() * 80 + "vw";
  no.style.top = Math.random() * 80 + "vh";
};

/* 🌟 stars */
function createStars(){
  for(let i=0;i<120;i++){
    const s = document.createElement("div");
    s.className = "star";
    s.style.left = Math.random()*100+"vw";
    s.style.top = Math.random()*100+"vh";
    s.style.animationDuration = (2+Math.random()*3)+"s";
    document.body.appendChild(s);
  }
}
createStars();

/* 🌸 petals */
setInterval(() => {
  const p = document.createElement("div");
  p.className = "petal";
  p.style.left = Math.random()*100+"vw";
  p.style.animationDuration = (5+Math.random()*5)+"s";
  document.body.appendChild(p);
  setTimeout(()=>p.remove(),10000);
},200);

/* 🐱 walking cats */
const cats = ["🐱","🐈","🐈‍⬛","😺","😸","🐱🌹"];

function spawnCat(){
  const c = document.createElement("div");
  c.className = "walk-cat";
  c.innerText = cats[Math.floor(Math.random()*cats.length)];
  c.style.bottom = Math.random()*40+"vh";
  c.style.animationDuration = (8+Math.random()*5)+"s";
  document.body.appendChild(c);
  setTimeout(()=>c.remove(),12000);
}
setInterval(spawnCat,2200);

/* 💖 SORRY LINE */
function spawnSorry(){
  const container = document.createElement("div");
  container.className = "sorry-cat";

  ["🐱 S","🐱 O","🐱 R","🐱 R","🐱 Y"].forEach((t,i)=>{
    const d = document.createElement("div");
    d.className = "sorry-letter";
    d.innerText = t;
    container.appendChild(d);
  });

  container.style.left = "-40vw";
  document.body.appendChild(container);

  let x = -40;
  const move = setInterval(()=>{
    x += 0.4;
    container.style.left = x+"vw";
    if(x>120){
      clearInterval(move);
      container.remove();
    }
  },20);
}
setInterval(spawnSorry,6000);
spawnSorry();

</script>

</body>
</html>
