<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Will you give me another chance?</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: Arial;
  color: white;

  background: radial-gradient(circle at top, #ffb6c1, #ff69b4, #2a1230);
  transition: 0.5s ease;
}

/* glow effect */
body.glow {
  box-shadow: inset 0 0 120px rgba(255, 105, 180, 0.6),
              inset 0 0 200px rgba(255, 182, 193, 0.4);
}

/* center box */
.box {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%,-50%);
  text-align: center;
  z-index: 10;
}

/* buttons */
button {
  padding: 10px 18px;
  margin: 10px;
  border: none;
  border-radius: 20px;
  cursor: pointer;
  transition: 0.3s ease;
}

#yes { background: #ffb6c1; }
#no { background: #fff; }

/* corner cat */
.corner-cat {
  position: absolute;
  bottom: 20px;
  right: 20px;
  width: 240px;
  padding: 12px;
  background: rgba(255,255,255,0.15);
  border-radius: 15px;
  backdrop-filter: blur(6px);
}

/* cat line */
.cat-line {
  position: absolute;
  top: 20px;
  left: 20px;
  display: flex;
  gap: 10px;
  background: rgba(255,255,255,0.15);
  padding: 10px;
  border-radius: 15px;
}

/* petals */
.petal {
  position: absolute;
  top: -10px;
  font-size: 20px;
  animation: fall linear infinite;
}

@keyframes fall {
  0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
  100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
}
</style>
</head>

<body>

<!-- MUSIC -->
<audio id="bgmusic" loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8b6b6c1b2.mp3?filename=romantic-114851.mp3">
</audio>

<audio id="sadSound">
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_2b9f3b8d8a.mp3?filename=sad-violin-ambient-110622.mp3">
</audio>

<button id="musicBtn">🎵 Play Music</button>

<!-- background cats -->
<div class="corner-cat">
🐱💔<br>
dont leave this cute fella boi of yours he sad forgive me
</div>

<div class="cat-line">
🐱 sorry 🐱 please forgive 🐱 💖 🐱 sorry
</div>

<!-- GAME -->
<div class="box">
  <h1>Will you give me another chance? 💔</h1>

  <p id="typing"></p>

  <button id="yes">Yes ❤️</button>
  <button id="no">No 😢</button>

  <h2 id="msg"></h2>
</div>

<script>
/* MUSIC */
const music = document.getElementById("bgmusic");
const sadSound = document.getElementById("sadSound");
const musicBtn = document.getElementById("musicBtn");

musicBtn.onclick = () => {
  music.play();
  musicBtn.innerText = "🎶 Playing...";
};

/* typing */
const text = "will you give me another chance? 💔";
let i = 0;

function type() {
  if (i < text.length) {
    document.getElementById("typing").innerHTML += text[i++];
    setTimeout(type, 60);
  }
}
type();

const yesBtn = document.getElementById("yes");
const noBtn = document.getElementById("no");
const msg = document.getElementById("msg");

/* YES grow + glow */
let yesScale = 1;
let glowLevel = 0;

setInterval(() => {
  if (yesScale < 3) {
    yesScale += 0.05;
    yesBtn.style.transform = `scale(${yesScale})`;

    glowLevel += 2;
    document.body.classList.add("glow");
    document.body.style.filter = `drop-shadow(0 0 ${glowLevel}px hotpink)`;
  }
}, 2000);

/* YES click */
yesBtn.onclick = () => {
  msg.innerHTML = "💖 Thank you... I’ll do better this time.";
  yesBtn.style.display = "none";
  noBtn.style.display = "none";
  document.getElementById("typing").style.display = "none";
};

/* NO messages */
const noMessages = [
  "💔 please think about it...",
  "🥺 one more chance please...",
  "💖 I promise I'll change...",
  "🙏 don't say no yet...",
  "💔 I’m really sorry..."
];

let noIndex = 0;

/* NO click */
noBtn.onclick = () => {
  noBtn.innerText = noMessages[noIndex];
  noIndex = (noIndex + 1) % noMessages.length;

  noBtn.style.position = "absolute";
  noBtn.style.left = Math.random() * 80 + "vw";
  noBtn.style.top = Math.random() * 80 + "vh";

  sadSound.currentTime = 0;
  sadSound.play();
};

/* petals */
setInterval(() => {
  const p = document.createElement("div");
  p.className = "petal";
  p.innerHTML = "🌸";
  p.style.left = Math.random() * 100 + "vw";
  p.style.animationDuration = (3 + Math.random() * 3) + "s";
  document.body.appendChild(p);
  setTimeout(() => p.remove(), 7000);
}, 200);
</script>

</body>
</html>
