<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Will you give me another chance?</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: Arial;
  background: linear-gradient(135deg, #120914, #2a1230, #3a1a40);
  color: white;
}

/* background */
.bg {
  position: fixed;
  width: 100%;
  height: 100%;
  z-index: -1;
}

/* petals + cats */
.petal, .cat {
  position: absolute;
  animation: fall linear infinite;
}

@keyframes fall {
  from { transform: translateY(-10vh); opacity: 1; }
  to { transform: translateY(110vh); opacity: 0; }
}

/* UI box */
.box {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
}

/* buttons */
button {
  padding: 10px 18px;
  margin: 10px;
  border: none;
  border-radius: 20px;
  cursor: pointer;
}

#yes { background: #ffb6c1; }
#no { background: #ddd; }

/* corner cat */
.corner-cat {
  position: absolute;
  bottom: 20px;
  right: 20px;
  width: 220px;
  padding: 12px;
  background: rgba(255,255,255,0.1);
  border-radius: 15px;
  font-size: 14px;
}

/* cat line */
.cat-line {
  position: absolute;
  top: 20px;
  left: 20px;
  display: flex;
  gap: 10px;
  background: rgba(255,255,255,0.08);
  padding: 10px;
  border-radius: 15px;
}
</style>
</head>

<body>

<div class="bg"></div>

<!-- cute scene -->
<div class="corner-cat">
🐱💔<br>
dont leave this cute fella boi of yours he sad forgive me
</div>

<div class="cat-line">
🐱 sorry 🐱 please forgive 🐱 💖 🐱 sorry
</div>

<!-- GAME -->
<div class="box">
  <h1>Will you give me another chance? 💔</h1>

  <p id="typing"></p>

  <button id="yes">Yes ❤️</button>
  <button id="no">No 😢</button>

  <h2 id="msg"></h2>
</div>

<script>
const typingText = "will you give me another chance? 💔";
let i = 0;

function type() {
  if (i < typingText.length) {
    document.getElementById("typing").innerHTML += typingText[i++];
    setTimeout(type, 60);
  }
}
type();

const yesBtn = document.getElementById("yes");
const noBtn = document.getElementById("no");
const msg = document.getElementById("msg");

/* YES */
yesBtn.onclick = () => {
  msg.innerHTML = "💖 Thank you... I’ll do better this time. I won’t take you for granted.";
  yesBtn.style.display = "none";
  noBtn.style.display = "none";
  document.getElementById("typing").style.display = "none";
};

/* NO moves */
noBtn.onmouseover = () => {
  noBtn.style.position = "absolute";
  noBtn.style.left = Math.random() * 80 + "vw";
  noBtn.style.top = Math.random() * 80 + "vh";
  noBtn.innerText = "💔 ok...";
};

/* petals */
setInterval(() => {
  let p = document.createElement("div");
  p.className = "petal";
  p.innerHTML = "🌸";
  p.style.left = Math.random() * 100 + "vw";
  p.style.animationDuration = (3 + Math.random() * 3) + "s";
  document.body.appendChild(p);
  setTimeout(() => p.remove(), 6000);
}, 300);

/* cats */
setInterval(() => {
  let c = document.createElement("div");
  c.className = "cat";
  c.innerHTML = "🐱";
  c.style.left = Math.random() * 100 + "vw";
  c.style.fontSize = (20 + Math.random() * 20) + "px";
  c.style.animationDuration = (4 + Math.random() * 3) + "s";
  document.body.appendChild(c);
  setTimeout(() => c.remove(), 7000);
}, 500);

</script>

</body>
</html>
