<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Will you give me another chance?</title>

<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: 'Quicksand', sans-serif;
  color: white;

  background: linear-gradient(-45deg, #ffb6c1, #ff69b4, #6a0dad, #2a1230);
  background-size: 400% 400%;
  animation: gradientMove 10s ease infinite;
}

/* background animation */
@keyframes gradientMove {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* moon */
.moon {
  position: absolute;
  top: 40px;
  right: 60px;
  width: 95px;
  height: 95px;
  border-radius: 50%;
  background: radial-gradient(circle at 30% 30%, #fff, #f5f5f5, #cfcfcf);
  box-shadow: 0 0 40px rgba(255,255,255,0.7);
  animation: moonFloat 6s ease-in-out infinite;
}

@keyframes moonFloat {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(10px); }
}

/* floating particles */
.particle {
  position: absolute;
  width: 6px;
  height: 6px;
  background: white;
  border-radius: 50%;
  opacity: 0.6;
  animation: floatUp linear infinite;
}

@keyframes floatUp {
  from { transform: translateY(100vh); }
  to { transform: translateY(-10vh); }
}

/* petals */
.petal {
  position: absolute;
  top: -10px;
  font-size: 18px;
  opacity: 0.7;
  animation: fall linear infinite;
}

@keyframes fall {
  0% { transform: translateY(-10vh) rotate(0); opacity: 0; }
  10% { opacity: 1; }
  100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
}

/* cats */
.cat {
  position: absolute;
  bottom: 10%;
  animation: walk 12s linear infinite;
}

@keyframes walk {
  from { transform: translateX(-10vw); }
  to { transform: translateX(110vw); }
}

/* box */
.box {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 85%;
  max-width: 520px;

  padding: 30px 20px;
  text-align: center;

  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;

  background: rgba(255,255,255,0.12);
  border-radius: 20px;
  backdrop-filter: blur(12px);

  animation: breathe 6s ease-in-out infinite;
  overflow: hidden;
}

/* breathing */
@keyframes breathe {
  0%,100% { transform: translate(-50%, -50%) scale(1); }
  50% { transform: translate(-50%, -52%) scale(1.02); }
}

/* fog */
.box::before {
  content: "";
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at 20% 30%, rgba(255,255,255,0.18), transparent 40%),
              radial-gradient(circle at 70% 60%, rgba(255,255,255,0.12), transparent 45%);
  filter: blur(6px);
}

/* moonlight sweep */
.box::after {
  content: "";
  position: absolute;
  top: -50%;
  left: -60%;
  width: 40%;
  height: 200%;
  background: linear-gradient(120deg, transparent, rgba(255,255,255,0.3), transparent);
  transform: rotate(25deg);
  animation: shine 6s infinite;
}

@keyframes shine {
  from { left: -60%; }
  to { left: 130%; }
}

.box > * {
  position: relative;
  z-index: 1;
}

h1 {
  margin: 0;
  font-size: 24px;
}

#typing {
  min-height: 30px;
  color: #fff0f5;
}

button {
  padding: 10px 18px;
  border: none;
  border-radius: 25px;
  cursor: pointer;
}

#yes { background: #ffb6c1; }
#no { background: #fff; }

/* droplets */
.drop {
  position: absolute;
  width: 6px;
  height: 14px;
  background: rgba(255,255,255,0.3);
  border-radius: 50%;
  animation: drip linear forwards;
}

@keyframes drip {
  from { transform: translateY(-10px); opacity: 0; }
  10% { opacity: 1; }
  to { transform: translateY(120vh); opacity: 0; }
}
</style>
</head>

<body>

<div class="moon"></div>

<audio id="bgmusic" loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8b6b6c1b2.mp3">
</audio>

<audio id="sadSound">
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_2b9f3b8d8a.mp3">
</audio>

<button id="musicBtn">🎵 Play Music</button>

<div class="box">

<h1 class="fade-in">Will you give me another chance? 💔</h1>

<p id="typing"></p>

<button id="yes">Yes ❤️</button>
<button id="no">No 😢</button>

<h2 id="msg"></h2>

</div>

<script>

const music = document.getElementById("bgmusic");
const sadSound = document.getElementById("sadSound");
document.getElementById("musicBtn").onclick = () => music.play();

/* typing */
const text = "will you give me another chance? 💔";
let i = 0;
function type(){
if(i<text.length){
document.getElementById("typing").innerHTML += text[i++];
setTimeout(type,60);
}}
type();

const yesBtn = document.getElementById("yes");
const noBtn = document.getElementById("no");
const msg = document.getElementById("msg");

/* YES grow + clear glass feel */
let scale = 1;
setInterval(()=>{
if(scale<3){
scale+=0.05;
yesBtn.style.transform=`scale(${scale})`;
document.querySelector(".box").style.backdropFilter="blur(6px)";
}
},2000);

/* YES action */
yesBtn.onclick = () => {
msg.innerHTML =
"💖 I promise this time I’m gonna give it my all and I’m sorry for all the hurt I caused you.";
yesBtn.style.display="none";
noBtn.style.display="none";
document.getElementById("typing").style.display="none";
};

/* NO loop messages */
const noTexts=[
"💔 please think about it...",
"🥺 one more chance...",
"💖 I’ll change...",
"🙏 don’t say no yet..."
];
let n=0;

noBtn.onclick=()=>{
noBtn.innerText=noTexts[n];
n=(n+1)%noTexts.length;

noBtn.style.position="absolute";
noBtn.style.left=Math.random()*80+"vw";
noBtn.style.top=Math.random()*80+"vh";

sadSound.currentTime=0;
sadSound.play();
};

/* petals */
setInterval(()=>{
const p=document.createElement("div");
p.className="petal";
p.innerHTML="🌸";
p.style.left=Math.random()*100+"vw";
p.style.animationDuration=(5+Math.random()*5)+"s";
document.body.appendChild(p);
setTimeout(()=>p.remove(),10000);
},300);

/* droplets */
setInterval(()=>{
const d=document.createElement("div");
d.className="drop";
d.style.left=Math.random()*100+"%";
d.style.animationDuration=(3+Math.random()*4)+"s";
document.querySelector(".box").appendChild(d);
setTimeout(()=>d.remove(),8000);
},400);

</script>

</body>
</html>
