<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Will you give me another chance?</title>

<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: 'Quicksand', sans-serif;
  color: white;
  height: 100vh;

  background: linear-gradient(-45deg, #ffb6c1, #ff69b4, #6a0dad, #2a1230);
  background-size: 400% 400%;
  animation: gradientMove 12s ease infinite;
}

@keyframes gradientMove {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* 🌙 moon */
.moon {
  position: absolute;
  top: 30px;
  right: 30px;
  width: 85px;
  height: 85px;
  border-radius: 50%;
  background: radial-gradient(circle, #fff, #ddd);
  box-shadow: 0 0 30px rgba(255,255,255,0.6);
}

/* 💎 box */
.box {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 90%;
  max-width: 520px;

  padding: 25px;
  text-align: center;

  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 15px;

  background: rgba(255,255,255,0.12);
  border-radius: 20px;
  backdrop-filter: blur(14px);
  z-index: 2;
}

h1 {
  margin: 0;
  font-size: 22px;
}

#typing {
  min-height: 30px;
}

/* 🔘 buttons */
button {
  padding: 14px 22px;
  border: none;
  border-radius: 25px;
  font-size: 16px;
  cursor: pointer;
  min-width: 140px;
}

#yes { background: #ffb6c1; }
#no { background: #fff; }

/* 🐱 cats */
.corner-cat, .rose-cat {
  position: fixed;
  bottom: 20px;
  width: 200px;
  padding: 10px;
  font-size: 12px;
  background: rgba(255,255,255,0.1);
  border-radius: 12px;
  z-index: 2;
}

.corner-cat { left: 20px; }
.rose-cat { right: 20px; }

/* 🌸 PETALS (FIXED - ALWAYS VISIBLE) */
.petal {
  position: absolute;
  top: -20px;
  font-size: 22px;
  pointer-events: none;
  z-index: 9999;

  opacity: 1;
  filter: drop-shadow(0 0 6px rgba(255,255,255,0.9));

  animation: fall linear forwards;
}

@keyframes fall {
  0% {
    transform: translateY(-10vh) rotate(0deg);
  }
  100% {
    transform: translateY(110vh) rotate(360deg);
  }
}
</style>
</head>

<body>

<div class="moon"></div>

<div class="corner-cat">🐱💔 I’m sorry…</div>
<div class="rose-cat">🐱🌹 roses for you 💖</div>

<div class="box" id="box">
  <h1>Will you give me another chance? 💔</h1>
  <p id="typing"></p>

  <button id="yes">Yes ❤️</button>
  <button id="no">No 😢</button>
</div>

<script>

/* typing effect */
const text = "will you give me another chance? 💔";
let i = 0;

function type(){
  if(i < text.length){
    document.getElementById("typing").innerHTML += text[i++];
    setTimeout(type, 60);
  }
}
type();

/* YES */
document.getElementById("yes").onclick = () => {
  document.getElementById("box").innerHTML = `
    <h2>🌸 Thank you…</h2>
    <p>I promise I’ll do better this time 💖</p>
  `;
};

/* NO button runaway */
const noBtn = document.getElementById("no");
const noTexts = [
"💔 please don’t say no...",
"🥺 think again...",
"💖 I’ll change...",
"🙏 one more chance..."
];

let n = 0;

noBtn.onclick = () => {
  noBtn.innerText = noTexts[n];
  n = (n + 1) % noTexts.length;

  const maxX = window.innerWidth - 160;
  const maxY = window.innerHeight - 120;

  noBtn.style.position = "absolute";
  noBtn.style.left = Math.random() * maxX + "px";
  noBtn.style.top = Math.random() * maxY + "px";
};

/* 🌸 FALLING PETALS (WORKING GUARANTEED) */
function createPetal() {
  const p = document.createElement("div");
  p.className = "petal";
  p.innerText = "🌸";

  p.style.left = Math.random() * 100 + "vw";
  p.style.fontSize = (16 + Math.random() * 20) + "px";
  p.style.animationDuration = (4 + Math.random() * 4) + "s";

  document.body.appendChild(p);

  setTimeout(() => p.remove(), 9000);
}

setInterval(createPetal, 120);

</script>

</body>
</html>
